    <!-- The Sidebar -->
<nav class="side-nav" id="sideNav" aria-label="Main Navigation">

            <div class="custom-select" id="themeDropdown">

                    <span id="currentThemeName">Default Blue</span>
                    <span class="arrow">󰅀</span>
                </button>
                <div class="select-options" role="listbox">
                    <button class="option" data-value="default" role="option">Default Blue</button>
                    <button class="option" data-value="dracula" role="option">Dracula Purple</button>
                    <button class="option" data-value="gruvbox" role="option">Gruvbox Retro</button>
